<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Writing Process Recorder - Replay</title>
  <script>
    (function initEarlyTheme() {
      var theme = "";
      var params = new URLSearchParams(window.location.search);
      var fromQuery = params.get("theme");
      var fromStorage = "";
      var fromWindowName = "";

      if (fromQuery === "light" || fromQuery === "dark") {
        theme = fromQuery;
      }

      if (!theme && window.name) {
        try {
          var parsed = JSON.parse(window.name);
          if (parsed && (parsed.theme === "light" || parsed.theme === "dark")) {
            fromWindowName = parsed.theme;
          }
        } catch (err) {
        }
      }

      if (!theme && fromWindowName) {
        theme = fromWindowName;
      }

      try {
        fromStorage = localStorage.getItem("wpr:theme") || "";
      } catch (err) {
      }

      if (!theme && (fromStorage === "light" || fromStorage === "dark")) {
        theme = fromStorage;
      }

      if (!theme) {
        theme = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }

      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
  <link rel="stylesheet" href="styles/base.css">
</head>
<body>
  <main class="container">
    <header class="header">
      <div class="header-top">
        <h1>Replay</h1>
        <button id="themeToggle" class="icon-btn" type="button" aria-label="Toggle theme" aria-pressed="false" title="Switch to dark theme">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M4 19h3V10H4v9zm6 0h3V5h-3v14zm6 0h3v-7h-3v7z"></path>
          </svg>
          <span id="themeLabel">Light</span>
        </button>
      </div>
      <p>Reconstruct writing from recorded edit events.</p>
    </header>

    <section class="panel">
      <label for="replayText">Replay output</label>
      <pre id="replayText" class="replay-text" aria-label="Replay output"></pre>
    </section>

    <section class="toolbar panel">
      <button id="playBtn" type="button">Play</button>
      <button id="pauseBtn" type="button">Pause</button>
      <label for="speedSelect">Speed</label>
      <select id="speedSelect">
        <option value="1">1x</option>
        <option value="2">2x</option>
        <option value="5" selected>5x</option>
        <option value="10">10x</option>
        <option value="20">20x</option>
        <option value="50">50x</option>
      </select>
      <label class="file-label" for="replayImportFile">Import JSON</label>
      <input id="replayImportFile" type="file" accept="application/json,.json">
      <button id="backBtn" type="button">Back to Compose</button>
    </section>

    <section class="panel progress-panel">
      <label for="progressBar">Progress</label>
      <input
        id="progressBar"
        type="range"
        min="0"
        max="0"
        value="0"
        step="1"
        disabled
        aria-label="Replay progress"
      >
      <div id="progressText" class="metrics">0%</div>
    </section>

    <section class="panel status-wrap" aria-live="polite">
      <div id="status" class="status">Ready.</div>
      <div id="metrics" class="metrics">Events: 0 | Cursor: 0</div>
    </section>
  </main>

  <script src="js/theme.js"></script>
  <script src="js/model.js"></script>
  <script src="js/replay.js"></script>
</body>
</html>
