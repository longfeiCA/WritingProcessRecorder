<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Writing Process Recorder - Compose</title>
  <link rel="stylesheet" href="styles/base.css">
</head>
<body>
  <main class="container">
    <header class="header">
      <h1>Writing Process Recorder</h1>
      <p>Compose text, record edits, and export/import sessions locally.</p>
    </header>

    <section class="panel">
      <label for="editor">Editor (plain text)</label>
      <textarea id="editor" spellcheck="false" aria-label="Writing editor"></textarea>
    </section>

    <section class="toolbar panel">
      <button id="undoBtn" type="button">Undo</button>
      <button id="saveBtn" type="button">Save JSON</button>
      <label class="file-label" for="importFile">Import JSON</label>
      <input id="importFile" type="file" accept="application/json,.json">
      <button id="toReplayBtn" type="button">Go to Replay</button>
    </section>

    <section class="panel status-wrap" aria-live="polite">
      <div id="status" class="status">Ready.</div>
      <div id="metrics" class="metrics">Events: 0</div>
    </section>
  </main>

  <script src="js/model.js"></script>
  <script src="js/compose.js"></script>
</body>
</html>
