<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Writing Process Recorder - Compose</title>
  <script>
    (function initEarlyTheme() {
      var theme = "";
      var params = new URLSearchParams(window.location.search);
      var fromQuery = params.get("theme");
      var fromStorage = "";
      var fromWindowName = "";

      if (fromQuery === "light" || fromQuery === "dark") {
        theme = fromQuery;
      }

      if (!theme && window.name) {
        try {
          var parsed = JSON.parse(window.name);
          if (parsed && (parsed.theme === "light" || parsed.theme === "dark")) {
            fromWindowName = parsed.theme;
          }
        } catch (err) {
        }
      }

      if (!theme && fromWindowName) {
        theme = fromWindowName;
      }

      try {
        fromStorage = localStorage.getItem("wpr:theme") || "";
      } catch (err) {
      }

      if (!theme && (fromStorage === "light" || fromStorage === "dark")) {
        theme = fromStorage;
      }

      if (!theme) {
        theme = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }

      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
  <link rel="stylesheet" href="styles/base.css">
</head>
<body>
  <main class="container">
    <header class="header">
      <div class="header-top">
        <h1>Writing Process Recorder</h1>
        <button id="themeToggle" class="icon-btn" type="button" aria-label="Toggle theme" aria-pressed="false" title="Switch to dark theme">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M4 19h3V10H4v9zm6 0h3V5h-3v14zm6 0h3v-7h-3v7z"></path>
          </svg>
          <span id="themeLabel">Light</span>
        </button>
      </div>
      <p>Compose text, record edits, and export/import sessions locally.</p>
    </header>

    <section class="panel">
      <label for="editor">Editor (plain text)</label>
      <textarea id="editor" spellcheck="false" aria-label="Writing editor"></textarea>
    </section>

    <section class="toolbar panel">
      <button id="undoBtn" type="button">Undo</button>
      <button id="saveBtn" type="button">Save JSON</button>
      <label class="file-label" for="importFile">Import JSON</label>
      <input id="importFile" type="file" accept="application/json,.json">
      <button id="toReplayBtn" type="button">Go to Replay</button>
    </section>

    <section class="panel status-wrap" aria-live="polite">
      <div id="status" class="status">Ready.</div>
      <div id="metrics" class="metrics">Events: 0</div>
    </section>
  </main>

  <script src="js/theme.js"></script>
  <script src="js/model.js"></script>
  <script src="js/compose.js"></script>
</body>
</html>
